<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#000000">
  <link rel="manifest" href="{{ url_for('static', filename='manifest.json') }}">
  <title>Serenity</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/monitor.css') }}">
  <script async src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
</head>
<body>
  <header class="top-header">
    <div class="header-inner">
      <div class="header-brand"><div class="header-logo">S</div><span class="header-title">Serenity</span></div>
      <div class="header-meta">
        <span class="header-time" id="header-time">--</span>
        <button class="refresh-btn" id="refresh-btn" onclick="manualRefresh()">⟳</button>
        <span class="status-dot"></span>
      </div>
    </div>
  </header>
  <nav class="tab-bar">
    <button class="tab-btn active" data-tab="overview"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg><span>总览</span></button>
    <button class="tab-btn" data-tab="holdings"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="1" y="5" width="22" height="14" rx="3"/><line x1="4" y1="12" x2="20" y2="12"/></svg><span>持仓</span></button>
    <button class="tab-btn" data-tab="sentinel"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="6" x2="12" y2="12"/><line x1="12" y1="12" x2="16" y2="14"/></svg><span>哨兵</span></button>
    <button class="tab-btn" data-tab="risk"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg><span>风控</span></button>
  </nav>
  <div class="market-tape" id="market-tape"><span class="tape-kicker">MARKET</span><div class="tape-track"><span>加载中...</span></div><span class="tape-time">--</span></div>
  <div class="tab-content active" id="tab-overview"><div class="loading-state"><span class="loading-spinner"></span><div class="loading-text">加载数据...</div></div></div>
  <div class="tab-content" id="tab-holdings"></div>
  <div class="tab-content" id="tab-sentinel"></div>
  <div class="tab-content" id="tab-risk"></div>
  <script src="{{ url_for('static', filename='js/monitor.js') }}"></script>
  <script>
    if('serviceWorker' in navigator){
      navigator.serviceWorker.register("{{ url_for('static', filename='sw.js') }}");
    }
  </script>
</body>
</html>
