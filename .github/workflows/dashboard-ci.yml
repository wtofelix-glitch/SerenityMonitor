name: Dashboard CI

on:
  push:
    branches: [main, master]
    paths:
      - "*.py"
      - "static/**"
      - "templates/**"
      - "tests/**"
      - ".github/workflows/dashboard-ci.yml"
  pull_request:
    branches: [main, master]
  workflow_dispatch: # 手动触发

env:
  PYTHON_VERSION: "3.13"

jobs:
  unit-tests:
    name: 单元测试
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt 2>/dev/null || true
          pip install pytest pytest-cov

      - name: 运行单元测试
        run: |
          python -m pytest tests/ \
            --ignore=tests/test_e2e_dashboard.py \
            --ignore=tests/test_e2e_dash.py \
            -v \
            --tb=short \
            --junitxml=reports/unit-test-results.xml \
            --cov=. --cov-report=term --cov-report=xml

      - name: 上传测试报告
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-reports
          path: reports/

  e2e-tests:
    name: E2E 视觉回归测试
    runs-on: ubuntu-latest
    needs: [unit-tests]

    steps:
      - uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt 2>/dev/null || true
          pip install pytest playwright
          python -m playwright install chromium

      - name: Flask 看板 E2E 测试
        run: |
          python -m pytest tests/test_e2e_dashboard.py \
            -v \
            --e2e \
            --tb=short \
            --junitxml=reports/e2e-flask-results.xml

      - name: Dash 看板 E2E 测试
        run: |
          python -m pytest tests/test_e2e_dash.py \
            -v \
            --e2e \
            --tb=short \
            --junitxml=reports/e2e-dash-results.xml

      - name: 上传 E2E 截图
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-screenshots
          path: tests/screenshots/

      - name: 上传 E2E 测试报告
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-test-reports
          path: reports/

  lint:
    name: 代码检查
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: 安装 ruff
        run: pip install ruff

      - name: ruff check
        run: ruff check --output-format=github .

  screenshot-baseline:
    name: 生成基线截图
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'

    steps:
      - uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt 2>/dev/null || true
          pip install pytest playwright
          python -m playwright install chromium

      - name: 生成基线截图
        run: |
          python -m pytest tests/test_e2e_dashboard.py \
            -v \
            --e2e \
            --baseline

      - name: 上传基线截图
        uses: actions/upload-artifact@v4
        with:
          name: screenshot-baselines
          path: tests/screenshots/flask/baseline/
